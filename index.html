<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>通用型 API 資料轉換器 V3.0（TFDA優化版）</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #f4f7f6;
      --card: #ffffff;
      --border: #e1e4e8;
      --primary: #0366d6;
      --primary-hover: #0255b3;
      --success: #1f8b4c;
      --warning: #e67e22;
      --danger: #c0392b;
      --text: #333;
      --muted: #666;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
      --radius: 12px;
    }

    * { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      color: var(--text);
      max-width: 1440px;
      margin: 0 auto;
      padding: 20px;
      background-color: var(--bg);
    }

    .hidden { display: none !important; }

    .header-container {
      text-align: center;
      margin-bottom: 20px;
    }

    h1 {
      color: #2c3e50;
      margin: 0;
      font-size: 2rem;
    }

    .subtitle {
      color: var(--muted);
      margin-top: 8px;
    }

    #api-input-area {
      background: var(--card);
      padding: 25px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 25px;
      border: 1px solid var(--border);
    }

    .input-group {
      display: flex;
      gap: 10px;
      width: 100%;
    }

    #api-url {
      flex: 1;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    #api-url:focus {
      border-color: #3498db;
    }

    button {
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    #fetch-btn {
      padding: 10px 28px;
      font-size: 16px;
      color: #fff;
      background-color: var(--primary);
      font-weight: bold;
      white-space: nowrap;
    }

    #fetch-btn:hover {
      background-color: var(--primary-hover);
    }

    #fetch-btn:disabled {
      background-color: #ccc;
      cursor: wait;
    }

    .quick-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .quick-btn {
      padding: 7px 12px;
      background: #eef4ff;
      color: #1f4f9a;
      border: 1px solid #d8e5ff;
      font-size: 0.9rem;
    }

    .quick-btn:hover {
      background: #dfeeff;
    }

    .tip-box {
      background: #f8f9fa;
      border: 1px solid #eceff1;
      border-radius: 8px;
      padding: 12px 14px;
      color: #555;
      font-size: 0.92rem;
    }

    .status-bar {
      font-size: 0.95em;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f8f9fa;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #eee;
      flex-wrap: wrap;
    }

    .proxy-badge {
      background: #3498db;
      color: white;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 0.82em;
      font-weight: 600;
    }

    #error-box {
      background: #fff2f2;
      color: #b42318;
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #fecaca;
      white-space: pre-wrap;
    }

    #debug-box {
      background: #1f2328;
      color: #f8f8f2;
      padding: 15px;
      border-radius: 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      overflow-x: auto;
      max-height: 340px;
      font-size: 0.9em;
      border: 1px solid #30363d;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .content-box {
      background-color: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      margin-bottom: 20px;
      border: 1px solid #eee;
    }

    .content-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .count-badge {
      font-size: 0.72em;
      background: #eee;
      padding: 2px 8px;
      border-radius: 999px;
      vertical-align: middle;
    }

    .secondary-btn {
      padding: 6px 12px;
      font-size: 0.86em;
      cursor: pointer;
      background: #f3f4f6;
      color: #333;
      border: 1px solid #ddd;
    }

    .secondary-btn:hover {
      background: #eaecef;
    }

    .table-actions-container {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      margin: 20px 0;
      align-items: center;
      justify-content: space-between;
    }

    .search-box {
      display: flex;
      gap: 10px;
      flex: 1;
      min-width: 280px;
    }

    #table-search-input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    .export-buttons-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .export-buttons-group button {
      padding: 8px 15px;
      font-size: 0.92em;
      color: #fff;
      border-radius: 6px;
    }

    .export-buttons-group button:hover {
      opacity: 0.92;
    }

    .export-buttons-group button:disabled {
      background-color: #ccc !important;
      cursor: not-allowed;
      opacity: 1;
    }

    #export-excel-btn { background-color: #217346; }
    #export-csv-btn   { background-color: #f39c12; }
    #export-json-btn  { background-color: #5b62f4; }

    .table-wrapper {
      overflow: auto;
      border: 1px solid #eee;
      border-radius: 6px;
      max-height: 70vh;
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
      font-size: 14px;
    }

    th, td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid #ddd;
      vertical-align: top;
      max-width: 320px;
      word-wrap: break-word;
      word-break: break-word;
    }

    th {
      background-color: #f8f9fa;
      position: sticky;
      top: 0;
      z-index: 10;
      white-space: nowrap;
    }

    tr:hover td {
      background: #fafafa;
    }

    .table-note {
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 0.9em;
    }

    #loader {
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.85);
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      backdrop-filter: blur(2px);
    }

    .spinner {
      border: 5px solid #f3f3f3;
      border-top: 5px solid #3498db;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .section-title {
      margin: 0 0 10px 0;
      color: #2c3e50;
      font-size: 1.1rem;
    }

    @media (max-width: 768px) {
      .input-group {
        flex-direction: column;
      }

      #fetch-btn {
        width: 100%;
      }

      .quick-actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div id="loader" class="hidden">
    <div class="spinner"></div>
    <p style="margin-top:10px; font-weight:bold;">資料偵探工作中...</p>
  </div>

  <div class="header-container">
    <h1>🔗 通用型 API 資料轉換器 V3.0</h1>
    <div class="subtitle">TFDA DataAction / OpenData 優化版，支援智慧抓取、除錯、搜尋與匯出</div>
  </div>

  <div id="api-input-area">
    <div class="input-group">
      <input
        type="text"
        id="api-url"
        placeholder="請貼上 API 網址..."
        value="https://data.fda.gov.tw/opendata/export/120/json"
      />
      <button id="fetch-btn">🔍 抓取並分析</button>
    </div>

    <div class="quick-actions">
      <button class="quick-btn" data-url="https://www.fda.gov.tw/DataAction?keyword=食品">TFDA DataAction：關鍵字「食品」</button>
      <button class="quick-btn" data-url="https://www.fda.gov.tw/DataAction?startdate=2025/1/1&enddate=2025/12/31">TFDA DataAction：2025 年新聞</button>
      <button class="quick-btn" data-url="https://data.fda.gov.tw/opendata/export/120/json">TFDA OpenData：本署新聞公告 JSON</button>
    </div>

    <div class="tip-box">
      <strong>提示：</strong><br>
      1. 若使用 <code>DataAction?startdate=2016/1/1</code> 這類大區間查詢，資料可能很多，建議加上 <code>enddate</code>。<br>
      2. 若直接連線失敗，系統會自動改走代理；但公共代理有時可能逾時。<br>
      3. 若 API 回傳不是標準陣列，系統會自動嘗試找出最像資料表的資料節點。
    </div>

    <div class="status-bar">
      <span>連線狀態：</span>
      <span id="connection-status">準備就緒</span>
      <span id="status-badge" class="proxy-badge hidden"></span>
    </div>

    <div id="error-box" class="hidden"></div>
    <div id="debug-box" class="hidden"></div>
  </div>

  <div id="main-content" class="hidden">
    <div class="content-box">
      <div class="content-header">
        <h2 style="margin:0;">
          資料預覽
          <span id="data-count-badge" class="count-badge"></span>
        </h2>
        <button id="reset-btn" class="secondary-btn">重置</button>
      </div>

      <div class="table-actions-container">
        <div class="search-box">
          <input type="text" id="table-search-input" placeholder="在結果中搜尋..." />
        </div>
        <div class="export-buttons-group">
          <button id="export-excel-btn" disabled>匯出 Excel</button>
          <button id="export-csv-btn" disabled>匯出 CSV</button>
          <button id="export-json-btn" disabled>匯出 JSON</button>
        </div>
      </div>

      <div id="table-note" class="table-note hidden"></div>

      <div class="table-wrapper">
        <div id="table-container"></div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const $ = (id) => document.getElementById(id);

      const els = {
        loader: $("loader"),
        mainContent: $("main-content"),
        errorBox: $("error-box"),
        debugBox: $("debug-box"),
        tableContainer: $("table-container"),
        apiUrlInput: $("api-url"),
        statusText: $("connection-status"),
        statusBadge: $("status-badge"),
        fetchBtn: $("fetch-btn"),
        resetBtn: $("reset-btn"),
        tableSearchInput: $("table-search-input"),
        exportExcelBtn: $("export-excel-btn"),
        exportCsvBtn: $("export-csv-btn"),
        exportJsonBtn: $("export-json-btn"),
        dataCountBadge: $("data-count-badge"),
        tableNote: $("table-note")
      };

      const state = {
        originalData: [],
        currentViewData: [],
        headers: [],
        rowRenderLimit: 300,
        fetchTimeoutMs: 18000
      };

      const PROXY_LIST = [
        { name: "Direct", mode: "direct", prefix: "" },
        { name: "AllOrigins-GET", mode: "allorigins-get", prefix: "https://api.allorigins.win/get?url=" },
        { name: "AllOrigins-RAW", mode: "allorigins-raw", prefix: "https://api.allorigins.win/raw?url=" },
        { name: "CORSProxy.io", mode: "raw", prefix: "https://corsproxy.io/?" }
      ];

      init();

      function init() {
        els.fetchBtn.addEventListener("click", startSmartFetch);
        els.apiUrlInput.addEventListener("keydown", (e) => {
          if (e.key === "Enter") startSmartFetch();
        });

        els.tableSearchInput.addEventListener("input", debounce(handleSearch, 250));
        els.exportExcelBtn.addEventListener("click", exportExcel);
        els.exportCsvBtn.addEventListener("click", exportCsv);
        els.exportJsonBtn.addEventListener("click", exportJson);
        els.resetBtn.addEventListener("click", resetApp);

        document.querySelectorAll(".quick-btn").forEach(btn => {
          btn.addEventListener("click", () => {
            els.apiUrlInput.value = btn.dataset.url || "";
          });
        });

        updateExportButtons();
      }

      async function startSmartFetch() {
        let url = normalizeApiUrl(els.apiUrlInput.value);
        els.apiUrlInput.value = url;

        if (!url) {
          showError("請輸入 API 網址。");
          return;
        }

        const warnings = getUrlWarnings(url);
        resetViewBeforeFetch();
        setLoading(true);

        if (warnings.length) {
          showError("提醒：\n" + warnings.join("\n"));
        }

        let success = false;
        let lastError = "";

        for (const proxy of PROXY_LIST) {
          setStatus(`嘗試通道：${proxy.name}`, "#333", proxy.name);

          try {
            const rawData = await fetchDataThroughProxy(url, proxy, state.fetchTimeoutMs);
            processSuccess(rawData, proxy.name);
            success = true;
            break;
          } catch (err) {
            console.warn(`[${proxy.name}]`, err);
            lastError = `${proxy.name}：${err.message}`;
          }
        }

        if (!success) {
          setStatus("所有通道失敗", "red");
          showError(
            "連線失敗，請檢查以下可能原因：\n" +
            "1. API 網址錯誤\n" +
            "2. 目標伺服器拒絕跨來源存取（CORS）\n" +
            "3. API 暫時無法連線或逾時\n" +
            "4. 公共代理服務目前不穩定\n\n" +
            (lastError ? `最後錯誤：${lastError}` : "")
          );
        }

        setLoading(false);
      }

      async function fetchDataThroughProxy(originalUrl, proxy, timeoutMs = 18000) {
        const targetUrl = proxy.prefix
          ? proxy.prefix + encodeURIComponent(originalUrl)
          : originalUrl;

        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), timeoutMs);

        try {
          const response = await fetch(targetUrl, {
            method: "GET",
            signal: controller.signal,
            headers: {
              "Accept": "application/json, text/plain, */*"
            }
          });

          if (!response.ok) {
            throw new Error(`HTTP ${response.status} ${response.statusText}`);
          }

          if (proxy.mode === "allorigins-get") {
            const wrapped = await response.json();
            if (!wrapped || typeof wrapped.contents !== "string") {
              throw new Error("AllOrigins GET 回傳格式異常");
            }

            const text = wrapped.contents.trim();
            if (!text) {
              throw new Error("代理回傳內容為空");
            }

            try {
              return JSON.parse(text);
            } catch (err) {
              const preview = text.slice(0, 250);
              throw new Error(`AllOrigins GET 成功，但內容不是 JSON。預覽：${preview}${text.length > 250 ? "..." : ""}`);
            }
          }

          const text = await response.text();
          const trimmed = text.trim();

          if (!trimmed) {
            throw new Error("回傳內容為空");
          }

          try {
            return JSON.parse(trimmed);
          } catch (err) {
            // 某些 API 可能回傳 text/json 以外內容；這邊盡量給出預覽協助除錯
            const preview = trimmed.slice(0, 250);
            throw new Error(`回傳內容不是合法 JSON。預覽：${preview}${trimmed.length > 250 ? "..." : ""}`);
          }
        } catch (err) {
          if (err.name === "AbortError") {
            throw new Error(`請求逾時（>${timeoutMs / 1000} 秒）`);
          }
          throw err;
        } finally {
          clearTimeout(timer);
        }
      }

      function processSuccess(rawData, proxyName) {
        setStatus(`連線成功`, "green", proxyName);
        showDebugInfo(rawData);

        const dataArray = normalizeToArray(rawData);

        if (!dataArray) {
          showError(
            "連線成功，但無法自動識別資料列表。\n" +
            "請查看下方「回應結構透視」，確認資料陣列位於哪個欄位。"
          );
          return;
        }

        if (dataArray.length === 0) {
          setStatus(`連線成功，但查詢結果為 0 筆`, "#e67e22", proxyName);
          state.originalData = [];
          state.currentViewData = [];
          state.headers = [];
          initTable();
          els.mainContent.classList.remove("hidden");
          return;
        }

        state.originalData = dataArray.map(item => {
          if (isPlainObject(item)) return flattenObject(item);
          return { value: item };
        });

        state.currentViewData = [...state.originalData];
        initTable();
        els.mainContent.classList.remove("hidden");
      }

      function normalizeToArray(rawData) {
        if (Array.isArray(rawData)) return rawData;

        if (isPlainObject(rawData)) {
          // 常見包裝 key
          const preferredKeys = ["items", "results", "data", "records", "rows", "list"];
          for (const key of preferredKeys) {
            if (Array.isArray(rawData[key])) return rawData[key];
          }

          // 若整個物件本身就是單筆，可包成陣列方便顯示
          const guessed = findBestDataArray(rawData);
          if (guessed) return guessed;

          const keys = Object.keys(rawData);
          if (keys.length > 0) return [rawData];
        }

        return null;
      }

      function showDebugInfo(data) {
        const lines = [];
        lines.push("🕵️ 回應結構透視");
        lines.push("=".repeat(40));

        if (Array.isArray(data)) {
          lines.push(`[Top Level] Array(length=${data.length})`);
          if (data.length > 0) {
            lines.push(`Sample type: ${typeof data[0]}`);
            if (isPlainObject(data[0])) {
              lines.push(`Sample keys: ${Object.keys(data[0]).join(", ") || "(無)"}`);
            }
          }
        } else if (isPlainObject(data)) {
          const topKeys = Object.keys(data);
          lines.push("[Top Level] Object");
          lines.push(`Keys: ${topKeys.join(", ") || "(無)"}`);

          ["items", "results", "data", "records", "rows", "list"].forEach(key => {
            if (key in data) {
              const value = data[key];
              if (Array.isArray(value)) {
                lines.push(`- ${key}: Array(${value.length})`);
              } else {
                lines.push(`- ${key}: ${typeof value}`);
              }
            }
          });

          if (looksLikeDataActionArrayWrapper(data)) {
            lines.push("Hint: 看起來像單筆/包裝物件，將嘗試自動表格化。");
          }
        } else {
          lines.push(`Primitive: ${String(data)}`);
        }

        els.debugBox.textContent = lines.join("\n");
        els.debugBox.classList.remove("hidden");
      }

      function looksLikeDataActionArrayWrapper(obj) {
        if (!isPlainObject(obj)) return false;
        const keys = Object.keys(obj);
        return ["標題", "內容", "附檔連結", "發布日期"].some(k => keys.includes(k));
      }

      function findBestDataArray(root) {
        if (Array.isArray(root)) return root;

        const preferredKeys = ["items", "results", "data", "records", "rows", "list"];
        const candidates = [];
        const seen = new WeakSet();

        function scoreArray(arr, path) {
          if (!Array.isArray(arr)) return -1;
          let score = arr.length;

          if (arr.length > 0 && arr.every(item => isPlainObject(item))) score += 1000;
          else if (arr.length > 0 && arr.some(item => isPlainObject(item))) score += 500;

          if (preferredKeys.some(k => path.endsWith("." + k) || path === k)) score += 300;
          return score;
        }

        function walk(node, path = "", depth = 0) {
          if (depth > 6 || node == null) return;

          if (Array.isArray(node)) {
            candidates.push({ path, value: node, score: scoreArray(node, path) });
            node.slice(0, 5).forEach((item, index) => {
              if (isPlainObject(item) || Array.isArray(item)) {
                walk(item, `${path}[${index}]`, depth + 1);
              }
            });
            return;
          }

          if (!isPlainObject(node)) return;
          if (seen.has(node)) return;
          seen.add(node);

          for (const key of Object.keys(node)) {
            walk(node[key], path ? `${path}.${key}` : key, depth + 1);
          }
        }

        preferredKeys.forEach(key => {
          if (root && Array.isArray(root[key])) {
            candidates.push({ path: key, value: root[key], score: scoreArray(root[key], key) + 100 });
          }
        });

        walk(root);

        if (!candidates.length) return null;
        candidates.sort((a, b) => b.score - a.score);
        return candidates[0].value;
      }

      function flattenObject(obj, prefix = "", result = {}) {
        if (!isPlainObject(obj)) return result;

        for (const key of Object.keys(obj)) {
          const newKey = prefix ? `${prefix}.${key}` : key;
          const value = obj[key];

          if (value == null) {
            result[newKey] = "";
          } else if (Array.isArray(value)) {
            if (value.every(v => typeof v !== "object" || v === null)) {
              result[newKey] = value.join(" | ");
            } else {
              result[newKey] = value.map(v => {
                try {
                  return JSON.stringify(v);
                } catch {
                  return String(v);
                }
              }).join(" | ");
            }
          } else if (isPlainObject(value)) {
            flattenObject(value, newKey, result);
          } else {
            result[newKey] = value;
          }
        }

        return result;
      }

      function initTable() {
        if (state.originalData.length === 0) {
          state.currentViewData = [];
          state.headers = [];
          els.dataCountBadge.textContent = "0 筆";
          updateExportButtons();
          renderTable();
          return;
        }

        const keySet = new Set();
        state.originalData.slice(0, 300).forEach(row => {
          Object.keys(row).forEach(key => keySet.add(key));
        });

        state.headers = Array.from(keySet).sort();
        els.dataCountBadge.textContent = `${state.originalData.length} 筆`;
        updateExportButtons();
        renderTable();
      }

      function renderTable() {
        els.tableContainer.innerHTML = "";
        els.tableNote.classList.add("hidden");
        els.tableNote.textContent = "";

        if (!state.currentViewData.length) {
          els.tableContainer.innerHTML =
            "<div style='text-align:center; padding:40px; color:#888;'>📭 查無資料<br><small>請嘗試放寬搜尋條件</small></div>";
          return;
        }

        const table = document.createElement("table");
        const thead = document.createElement("thead");
        const headRow = document.createElement("tr");

        state.headers.forEach(header => {
          const th = document.createElement("th");
          th.textContent = header;
          headRow.appendChild(th);
        });

        thead.appendChild(headRow);
        table.appendChild(thead);

        const tbody = document.createElement("tbody");
        const fragment = document.createDocumentFragment();

        const rowsToRender = state.currentViewData.slice(0, state.rowRenderLimit);

        rowsToRender.forEach(row => {
          const tr = document.createElement("tr");

          state.headers.forEach(header => {
            const td = document.createElement("td");
            let val = row[header] !== undefined ? String(row[header]) : "";

            if (val.length > 180) {
              td.title = val;
              val = val.slice(0, 180) + "...";
            }

            td.textContent = val;
            tr.appendChild(td);
          });

          fragment.appendChild(tr);
        });

        tbody.appendChild(fragment);
        table.appendChild(tbody);
        els.tableContainer.appendChild(table);

        if (state.currentViewData.length > state.rowRenderLimit) {
          els.tableNote.textContent =
            `為了效能，畫面目前只顯示前 ${state.rowRenderLimit} 筆；匯出仍會包含目前篩選後的全部資料。`;
          els.tableNote.classList.remove("hidden");
        }
      }

      function handleSearch(event) {
        const term = event.target.value.trim().toLowerCase();

        if (!term) {
          state.currentViewData = [...state.originalData];
        } else {
          state.currentViewData = state.originalData.filter(row =>
            Object.values(row).some(value =>
              String(value).toLowerCase().includes(term)
            )
          );
        }

        els.dataCountBadge.textContent =
          `${state.currentViewData.length} / ${state.originalData.length} 筆`;

        renderTable();
        updateExportButtons();
      }

      function exportExcel() {
        if (!state.currentViewData.length) return;
        const ws = XLSX.utils.json_to_sheet(state.currentViewData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Data");
        XLSX.writeFile(wb, createFilename("xlsx"));
      }

      function exportCsv() {
        if (!state.currentViewData.length) return;

        const rows = [state.headers, ...state.currentViewData.map(row =>
          state.headers.map(h => row[h] ?? "")
        )];

        const csv = rows.map(cols =>
          cols.map(escapeCsvCell).join(",")
        ).join("\r\n");

        const bom = "\uFEFF";
        downloadBlob(
          new Blob([bom + csv], { type: "text/csv;charset=utf-8;" }),
          createFilename("csv")
        );
      }

      function exportJson() {
        if (!state.currentViewData.length) return;

        const json = JSON.stringify(state.currentViewData, null, 2);
        downloadBlob(
          new Blob([json], { type: "application/json;charset=utf-8;" }),
          createFilename("json")
        );
      }

      function escapeCsvCell(value) {
        const str = String(value ?? "");
        const escaped = str.replace(/"/g, '""');
        return /[",\r\n]/.test(str) ? `"${escaped}"` : escaped;
      }

      function createFilename(ext) {
        const now = new Date();
        const ts = [
          now.getFullYear(),
          String(now.getMonth() + 1).padStart(2, "0"),
          String(now.getDate()).padStart(2, "0"),
          "_",
          String(now.getHours()).padStart(2, "0"),
          String(now.getMinutes()).padStart(2, "0"),
          String(now.getSeconds()).padStart(2, "0")
        ].join("");
        return `api_export_${ts}.${ext}`;
      }

      function downloadBlob(blob, filename) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }

      function updateExportButtons() {
        const disabled = state.currentViewData.length === 0;
        els.exportExcelBtn.disabled = disabled;
        els.exportCsvBtn.disabled = disabled;
        els.exportJsonBtn.disabled = disabled;
      }

      function resetViewBeforeFetch() {
        hideError();
        hideDebug();
        els.mainContent.classList.add("hidden");
        state.originalData = [];
        state.currentViewData = [];
        state.headers = [];
        els.tableSearchInput.value = "";
        els.dataCountBadge.textContent = "";
        els.tableContainer.innerHTML = "";
        els.tableNote.classList.add("hidden");
        updateExportButtons();
        els.fetchBtn.disabled = true;
      }

      function resetApp() {
        els.apiUrlInput.value = "";
        hideError();
        hideDebug();
        setStatus("準備就緒", "#666");
        els.mainContent.classList.add("hidden");
        state.originalData = [];
        state.currentViewData = [];
        state.headers = [];
        els.tableSearchInput.value = "";
        els.tableContainer.innerHTML = "";
        els.dataCountBadge.textContent = "";
        els.tableNote.classList.add("hidden");
        updateExportButtons();
      }

      function setStatus(text, color = "#666", badgeText = "") {
        els.statusText.textContent = text;
        els.statusText.style.color = color;

        if (badgeText) {
          els.statusBadge.textContent = badgeText;
          els.statusBadge.classList.remove("hidden");
        } else {
          els.statusBadge.textContent = "";
          els.statusBadge.classList.add("hidden");
        }
      }

      function setLoading(show) {
        if (show) {
          els.loader.classList.remove("hidden");
        } else {
          els.loader.classList.add("hidden");
          els.fetchBtn.disabled = false;
        }
      }

      function showError(message) {
        els.errorBox.textContent = message;
        els.errorBox.classList.remove("hidden");
      }

      function hideError() {
        els.errorBox.textContent = "";
        els.errorBox.classList.add("hidden");
      }

      function hideDebug() {
        els.debugBox.textContent = "";
        els.debugBox.classList.add("hidden");
      }

      function isPlainObject(value) {
        return Object.prototype.toString.call(value) === "[object Object]";
      }

      function debounce(fn, delay = 250) {
        let timer = null;
        return (...args) => {
          clearTimeout(timer);
          timer = setTimeout(() => fn(...args), delay);
        };
      }

      function normalizeApiUrl(url) {
        let normalized = (url || "").trim();
        if (!normalized) return "";

        // TFDA DataAction：優先升級為 HTTPS
        normalized = normalized.replace(
          /^http:\/\/www\.fda\.gov\.tw\/DataAction/i,
          "https://www.fda.gov.tw/DataAction"
        );

        // 若使用者貼的是說明頁，不是 API 本體
        normalized = normalized.replace(
          /^https:\/\/www\.fda\.gov\.tw\/TC\/DataAction\.aspx$/i,
          "https://www.fda.gov.tw/DataAction?keyword=食品"
        );

        return normalized;
      }

      function getUrlWarnings(url) {
        const warnings = [];

        try {
          const u = new URL(url);

          if (/fda\.gov\.tw$/i.test(u.hostname) && /\/DataAction$/i.test(u.pathname)) {
            const startdate = u.searchParams.get("startdate");
            const enddate = u.searchParams.get("enddate");

            if (startdate && !enddate) {
              warnings.push("此 TFDA DataAction 查詢只設定了 startdate，可能回傳大量資料（官方說明最多 1000 筆）。");
            }

            if (!startdate && !enddate && !u.searchParams.get("keyword")) {
              warnings.push("此 TFDA DataAction 查詢沒有帶 keyword / startdate / enddate，建議至少提供一個條件。");
            }
          }

          if (/data\.fda\.gov\.tw$/i.test(u.hostname) && /\/opendata\/export\/120\/json$/i.test(u.pathname)) {
            // OpenData 新聞公告 JSON，通常可直接處理
          }
        } catch (err) {
          warnings.push("網址格式可能不正確，請再確認。");
        }

        return warnings;
      }
    });
  </script>
</body>
</html>
